<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Better Dispatch Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="settings-container">
    <header>
      <h1>Better Dispatch ⚡ Configurations</h1>
      <p class="subtitle">Manage your tokens and API secrets</p>
    </header>

    <section class="card">
      <h2>GitHub Personal Access Token (PAT)</h2>
      <p class="hint">Required scope: <code>workflow</code> or <code>actions:write</code></p>
      <div class="input-group">
        <input type="password" id="github-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off">
        <button id="toggle-token" class="btn-icon" title="Toggle visibility">👁</button>
      </div>
      <div id="token-status" class="status"></div>
    </section>

    <section class="card">
      <h2>External API Secrets Vault</h2>
      <p class="hint">Key-value pairs used for <code>${SETTINGS_*}</code> interpolation in datasource URLs.</p>
      <div id="secrets-list"></div>
      <div class="secret-row add-row">
        <input type="text" id="new-secret-key" placeholder="SETTINGS_INTERNAL_TOKEN" autocomplete="off">
        <input type="password" id="new-secret-value" placeholder="Secret value" autocomplete="off">
        <button id="add-secret" class="btn-primary">Add</button>
      </div>
    </section>

    <div id="save-status" class="save-status"></div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
